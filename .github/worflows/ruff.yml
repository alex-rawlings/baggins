name: Ruff PR Check

on:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

